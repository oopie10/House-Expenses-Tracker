<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Expense Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 10px; padding: 1rem; border: 0.5px solid #e0e0d8; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 10px; }
  textarea { width: 100%; resize: none; font-size: 14px; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #f9f9f7; color: #1a1a1a; font-family: inherit; outline: none; }
  textarea:focus { border-color: #999; }
  .row { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  button { display: flex; align-items: center; gap: 6px; font-size: 14px; padding: 7px 14px; border: 0.5px solid #ccc; border-radius: 8px; background: transparent; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  button:hover { background: #f0f0ee; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status-msg { font-size: 13px; color: #888; }
  .log-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid #f0f0ee; font-size: 14px; }
  .log-item:last-child { border-bottom: none; }
  .log-desc { font-weight: 500; }
  .log-date { font-size: 12px; color: #999; margin-left: 6px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .log-amount { font-weight: 500; white-space: nowrap; margin-left: 8px; }
  .sync-time { font-size: 12px; color: #bbb; }
  .hint { font-size: 12px; color: #aaa; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>🏠 House Expense Tracker</h1>

  <div class="stats">
    <div class="stat"><div class="stat-label">This month</div><div class="stat-value" id="stat-month">$0</div></div>
    <div class="stat"><div class="stat-label">Rental unit</div><div class="stat-value" id="stat-rental">$0</div></div>
    <div class="stat"><div class="stat-label">Tax deductible</div><div class="stat-value" id="stat-tax">$0</div></div>
    <div class="stat"><div class="stat-label">Total logged</div><div class="stat-value" id="stat-count">0</div></div>
  </div>

  <div class="card">
    <div class="card-title">Log an expense</div>
    <textarea id="expense-input" rows="2" placeholder="e.g. paid $240 for a new kitchen faucet in the rental unit on May 15"></textarea>
    <div class="row">
      <button id="log-btn" onclick="logExpense()">+ Log expense</button>
      <span id="status-msg"></span>
    </div>
    <p class="hint">Press Enter to submit. The AI will parse the date, amount, category, unit, and tax status automatically.</p>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div class="card-title" style="margin:0;">Recent expenses</div>
      <span class="sync-time" id="sheet-status"></span>
    </div>
    <div id="log-list"><p style="font-size:13px;color:#bbb;">No expenses logged yet.</p></div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3pBOBwnu3eDeb28L1sc5gmcnsug-gNz1BMzAHLbwbt2cc4LhUzVNY4ZygEGdXkWoFnQ/exec";
const ANTHROPIC_URL = "https://api.anthropic.com/v1/messages";
const API_KEY = "YOUR_ANTHROPIC_API_KEY_HERE";
let expenses = [];

const CAT_COLORS = {
  Repairs:    {bg:"#FAECE7",color:"#712B13"}, Utilities: {bg:"#E6F1FB",color:"#0C447C"},
  Appliances: {bg:"#EEEDFE",color:"#3C3489"}, Insurance: {bg:"#E1F5EE",color:"#085041"},
  Taxes:      {bg:"#FAEEDA",color:"#633806"}, Supplies:  {bg:"#EAF3DE",color:"#27500A"},
  Services:   {bg:"#FBEAF0",color:"#72243E"}, Other:     {bg:"#F1EFE8",color:"#444441"}
};
const UNIT_COLORS = {
  Own:    {bg:"#E1F5EE",color:"#085041"},
  Rental: {bg:"#E6F1FB",color:"#0C447C"},
  Both:   {bg:"#FAEEDA",color:"#633806"}
};

function updateStats() {
  const now = new Date();
  const thisMonth = expenses.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  document.getElementById("stat-month").textContent = "$" + thisMonth.reduce((s,e)=>s+e.amount,0).toFixed(2);
  document.getElementById("stat-rental").textContent = "$" + expenses.filter(e=>e.unit==="Rental").reduce((s,e)=>s+e.amount,0).toFixed(2);
  document.getElementById("stat-tax").textContent = "$" + expenses.filter(e=>e.taxDeductible==="Yes").reduce((s,e)=>s+e.amount,0).toFixed(2);
  document.getElementById("stat-count").textContent = expenses.length;
}

function renderLog() {
  const el = document.getElementById("log-list");
  if (!expenses.length) { el.innerHTML = '<p style="font-size:13px;color:#bbb;">No expenses logged yet.</p>'; return; }
  el.innerHTML = [...expenses].reverse().slice(0,10).map(e => {
    const cat = CAT_COLORS[e.category] || CAT_COLORS.Other;
    const unit = UNIT_COLORS[e.unit] || UNIT_COLORS.Own;
    const taxBg = e.taxDeductible==="Yes" ? "#EAF3DE" : "#F1EFE8";
    const taxColor = e.taxDeductible==="Yes" ? "#27500A" : "#444441";
    return `<div class="log-item">
      <div style="flex:1">
        <span class="log-desc">${e.description}</span>
        <span class="log-date">${e.date}</span>
        <div class="badges">
          <span class="badge" style="background:${cat.bg};color:${cat.color}">${e.category}</span>
          <span class="badge" style="background:${unit.bg};color:${unit.color}">${e.unit}</span>
          <span class="badge" style="background:${taxBg};color:${taxColor}">${e.taxDeductible==="Yes"?"tax deductible":"not deductible"}</span>
        </div>
      </div>
      <span class="log-amount">$${e.amount.toFixed(2)}</span>
    </div>`;
  }).join("");
}

function setStatus(msg, color) {
  const el = document.getElementById("status-msg");
  el.textContent = msg;
  el.style.color = color || "#888";
}

async function parseExpense(text) {
  const today = new Date().toISOString().split("T")[0];
  const resp = await fetch(ANTHROPIC_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": API_KEY, "anthropic-version": "2023-06-01" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: `You are an expense parser for a duplex homeowner. Extract structured data and return ONLY valid JSON, no preamble or markdown. Today is ${today}.
Return: {"date":"YYYY-MM-DD","description":"short description","category":"Repairs|Utilities|Appliances|Insurance|Taxes|Supplies|Services|Other","amount":123.45,"unit":"Own|Rental|Both","taxDeductible":"Yes|No"}
Rental repairs are typically tax deductible. Use today if no date given.`,
      messages: [{ role: "user", content: text }]
    })
  });
  const data = await resp.json();
  const raw = data.content.find(b=>b.type==="text")?.text || "";
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

async function sendToSheets(expense) {
  const resp = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(expense)
  });
  const text = await resp.text();
  try {
    const result = JSON.parse(text);
    if (result.success === false) throw new Error(result.error || "Sheet error");
  } catch(e) { /* non-JSON response is fine */ }
}

async function logExpense() {
  const input = document.getElementById("expense-input");
  const text = input.value.trim();
  if (!text) return;
  if (API_KEY === "YOUR_ANTHROPIC_API_KEY_HERE") {
    setStatus("⚠ Add your Anthropic API key to the file first", "#c0392b");
    return;
  }
  const btn = document.getElementById("log-btn");
  btn.disabled = true;
  setStatus("Parsing with AI...");
  try {
    const expense = await parseExpense(text);
    setStatus("Sending to Google Sheets...");
    await sendToSheets(expense);
    expenses.push(expense);
    updateStats();
    renderLog();
    input.value = "";
    setStatus("✓ Logged successfully!", "#27ae60");
    document.getElementById("sheet-status").textContent = "Last synced: " + new Date().toLocaleTimeString();
    setTimeout(() => setStatus(""), 4000);
  } catch(err) {
    console.error(err);
    setStatus("⚠ " + err.message, "#c0392b");
  }
  btn.disabled = false;
}

document.getElementById("expense-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); logExpense(); }
});
</script>
</body>
</html>
